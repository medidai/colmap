name: PyCOLMAP wheels

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: [main, "release/**"]
    paths:
      - ".github/workflows/build-pycolmap.yml"
      - "CMakeLists.txt"
      - "cmake/**"
      - "pycolmap/**"
      - "src/**"
      - "vcpkg.json"
  pull_request:
    paths:
      - ".github/workflows/build-pycolmap.yml"
      - "CMakeLists.txt"
      - "cmake/**"
      - "pycolmap/**"
      - "src/**"
      - "vcpkg.json"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the wheels to AWS CodeArtifact
        required: true
        type: boolean
        default: false

permissions:
  contents: read

env:
  CODEARTIFACT_DOMAIN: medida
  CODEARTIFACT_OWNER: "697728436371"
  CODEARTIFACT_REPOSITORY: python
  CODEARTIFACT_REGION: us-east-1
  UV_VERSION: 0.11.30
  COMPILER_CACHE_DIR: ${{ github.workspace }}/compiler-cache
  CCACHE_DIR: ${{ github.workspace }}/compiler-cache/ccache
  CCACHE_MAXSIZE: 400M
  MACOSX_DEPLOYMENT_TARGET: "15.0"

jobs:
  validate:
    name: Validate uv project
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
      - name: Validate locked development environment
        run: |
          uv lock --directory pycolmap --check
          uv sync --directory pycolmap --frozen --no-install-project

  build:
    name: Build ${{ matrix.platform }}
    needs: validate
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-24.04
            cuda: false
          - platform: linux-x86_64-cuda12
            runner: ubuntu-24.04
            cuda: true
          - platform: macos-arm64
            runner: macos-15
            cuda: false
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Free disk space for CUDA build
        if: matrix.cuda
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Export GitHub Actions cache credentials
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable("ACTIONS_CACHE_URL", process.env.ACTIONS_CACHE_URL || "");
            core.exportVariable("ACTIONS_RUNTIME_TOKEN", process.env.ACTIONS_RUNTIME_TOKEN || "");
      - name: Restore compiler cache
        uses: actions/cache@v6
        with:
          path: compiler-cache
          key: pycolmap-${{ matrix.platform }}-${{ github.sha }}
          restore-keys: pycolmap-${{ matrix.platform }}-
      - name: Configure Linux build
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "CIBW_ARCHS_LINUX=x86_64" >> "$GITHUB_ENV"
          echo "BUILD_CUDA_ENABLED=${{ matrix.cuda }}" >> "$GITHUB_ENV"
          echo "CONTAINER_COMPILER_CACHE_DIR=/compiler-cache" >> "$GITHUB_ENV"
          echo "CCACHE_DIR=/compiler-cache/ccache" >> "$GITHUB_ENV"
          echo "CCACHE_BASEDIR=/project" >> "$GITHUB_ENV"
          echo "VCPKG_TARGET_TRIPLET=x64-linux-release" >> "$GITHUB_ENV"
          echo "VCPKG_INSTALLATION_ROOT=/project/vcpkg" >> "$GITHUB_ENV"
          echo "CMAKE_TOOLCHAIN_FILE=/project/vcpkg/scripts/buildsystems/vcpkg.cmake" >> "$GITHUB_ENV"
          echo "VCPKG_BINARY_SOURCES=clear;x-gha,readwrite" >> "$GITHUB_ENV"
          echo "CIBW_ENVIRONMENT_PASS_LINUX=ACTIONS_CACHE_URL ACTIONS_RUNTIME_TOKEN BUILD_CUDA_ENABLED CCACHE_DIR CCACHE_BASEDIR CCACHE_MAXSIZE CONTAINER_COMPILER_CACHE_DIR VCPKG_TARGET_TRIPLET VCPKG_INSTALLATION_ROOT CMAKE_TOOLCHAIN_FILE VCPKG_BINARY_SOURCES" >> "$GITHUB_ENV"
          echo "CIBW_CONFIG_SETTINGS=cmake.define.CMAKE_TOOLCHAIN_FILE=/project/vcpkg/scripts/buildsystems/vcpkg.cmake cmake.define.VCPKG_TARGET_TRIPLET=x64-linux-release cmake.define.VCPKG_INSTALLED_DIR=/project/build/vcpkg_installed" >> "$GITHUB_ENV"
          echo "CIBW_CONTAINER_ENGINE=docker; create_args: -v ${{ github.workspace }}/compiler-cache:/compiler-cache" >> "$GITHUB_ENV"
          if [[ "${{ matrix.cuda }}" == "true" ]]; then
            echo "CIBW_MANYLINUX_X86_64_IMAGE=pytorch/manylinux2_28-builder:cuda12.9" >> "$GITHUB_ENV"
            echo "CIBW_REPAIR_WHEEL_COMMAND=auditwheel repair --exclude 'libcudart*' --exclude 'libcurand*' -w {dest_dir} {wheel}" >> "$GITHUB_ENV"
            sed -i 's/^name = "pycolmap"$/name = "pycolmap-cuda12"/' pycolmap/pyproject.toml
            sed -i 's/^dependencies = \["numpy"\]$/dependencies = ["numpy", "cuda-toolkit[cudart,curand]>=12,<13"]/' pycolmap/pyproject.toml
            grep -F 'name = "pycolmap-cuda12"' pycolmap/pyproject.toml
            grep -F 'cuda-toolkit[cudart,curand]>=12,<13' pycolmap/pyproject.toml
          fi
      - name: Configure macOS build
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "CIBW_ARCHS_MACOS=arm64" >> "$GITHUB_ENV"
          echo "VCPKG_TARGET_TRIPLET=arm64-osx-release" >> "$GITHUB_ENV"
          echo "VCPKG_INSTALLATION_ROOT=/Users/runner/work/vcpkg" >> "$GITHUB_ENV"
          echo "CMAKE_TOOLCHAIN_FILE=/Users/runner/work/vcpkg/scripts/buildsystems/vcpkg.cmake" >> "$GITHUB_ENV"
          echo "CMAKE_OSX_ARCHITECTURES=arm64" >> "$GITHUB_ENV"
          echo "ARCHFLAGS=-arch arm64" >> "$GITHUB_ENV"
          echo "VCPKG_BINARY_SOURCES=clear;x-gha,readwrite" >> "$GITHUB_ENV"
          echo "CIBW_CONFIG_SETTINGS=cmake.define.CMAKE_TOOLCHAIN_FILE=/Users/runner/work/vcpkg/scripts/buildsystems/vcpkg.cmake cmake.define.VCPKG_TARGET_TRIPLET=arm64-osx-release cmake.define.VCPKG_INSTALLED_DIR=${{ github.workspace }}/build/vcpkg_installed cmake.define.CMAKE_OSX_ARCHITECTURES=arm64 cmake.define.CMAKE_OSX_DEPLOYMENT_TARGET=15.0" >> "$GITHUB_ENV"
      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        with:
          package-dir: ./pycolmap
          output-dir: wheelhouse
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: pycolmap-${{ matrix.platform }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  test-linux:
    name: Test Linux wheel on Ubuntu ${{ matrix.ubuntu }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        ubuntu: [22.04, 24.04]
    runs-on: ubuntu-${{ matrix.ubuntu }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: pycolmap-linux-x86_64
          path: wheelhouse
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install and import the wheel
        run: |
          uv venv --python 3.12
          uv pip install wheelhouse/*.whl
          uv run --no-project python -c "import pycolmap; print(pycolmap.__version__)"

  test-macos:
    name: Test macOS wheel on macOS ${{ matrix.macos }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        macos: [15, 26]
    runs-on: macos-${{ matrix.macos }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: pycolmap-macos-arm64
          path: wheelhouse
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install and import the wheel
        run: |
          uv venv --python 3.12
          uv pip install wheelhouse/*.whl
          uv run --no-project python -c "import pycolmap; print(pycolmap.__version__)"

  test-cuda-package:
    name: Test CUDA 12 package installation
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: pycolmap-linux-x86_64-cuda12
          path: wheelhouse
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install and import the CUDA distribution
        run: |
          uv venv --python 3.12
          uv pip install wheelhouse/*.whl
          uv run --no-project python -c "from importlib.metadata import version; import pycolmap; assert pycolmap.has_cuda; print(version('pycolmap-cuda12'), pycolmap.__version__)"

  publish:
    name: Publish to CodeArtifact
    needs: [build, test-linux, test-macos, test-cuda-package]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: [self-hosted, Linux, X64, aws]
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: pycolmap-*
          path: wheelhouse
          merge-multiple: true
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
      - name: Publish wheels
        shell: bash
        run: |
          token="$(aws codeartifact get-authorization-token --domain "$CODEARTIFACT_DOMAIN" --domain-owner "$CODEARTIFACT_OWNER" --region "$CODEARTIFACT_REGION" --duration-seconds 0 --query authorizationToken --output text)"
          publish_url="$(aws codeartifact get-repository-endpoint --domain "$CODEARTIFACT_DOMAIN" --domain-owner "$CODEARTIFACT_OWNER" --repository "$CODEARTIFACT_REPOSITORY" --format pypi --region "$CODEARTIFACT_REGION" --query repositoryEndpoint --output text)"
          UV_PUBLISH_USERNAME=aws UV_PUBLISH_PASSWORD="$token" \
            uv publish --publish-url "$publish_url" --check-url "${publish_url}simple/" wheelhouse/*.whl
